services:
  zookeeper:
    image: devprincekumar/zookeeper-arm:3.7.0
    container_name: zookeeper-1
    hostname: zookeeper-1
    restart: unless-stopped
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: >
        server.1=192.168.1.26:2888:3888;
        server.2=192.168.1.27:2888:3888;
        server.3=192.168.1.28:2888:3888
    ports:
      - "2181:2181"
    volumes:
      - ./data/zookeeper:/var/lib/zookeeper   

  kafka:
    image: devprincekumar/kafka-arm:3.7.0
    container_name: kafka-1
    hostname: kafka-1
    depends_on:
      - zookeeper
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 192.168.1.26:2181,192.168.1.27:2181,192.168.1.28:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.168.1.26:9092

 
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./data/kafka:/var/lib/kafka          
