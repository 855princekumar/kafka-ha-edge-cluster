version: "3.8"

services:
  zookeeper:
    image: devprincekumar/zookeeper-arm:3.7.0
    container_name: zookeeper-${NODE_ID}
    hostname: zookeeper-${NODE_ID}
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data/zookeeper/conf/zookeeper.properties:/opt/kafka/config/zookeeper.properties
      - ./data/zookeeper/data:/var/lib/zookeeper
    command:
      - /opt/kafka/bin/zookeeper-server-start.sh
      - /opt/kafka/config/zookeeper.properties

  kafka:
    image: devprincekumar/kafka-arm:3.7.0
    container_name: kafka-${NODE_ID}
    hostname: kafka-${NODE_ID}
    network_mode: host
    restart: unless-stopped
    depends_on:
      - zookeeper
    env_file:
      - .env
    environment:
      KAFKA_BROKER_ID: ${NODE_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}

      # ✅ CORRECT LISTENERS
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${HOST_IP}:9092

      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_DEFAULT_REPLICATION_FACTOR}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./data/kafka:/var/lib/kafka
